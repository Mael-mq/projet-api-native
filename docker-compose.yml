services:
    api:
        build: .
        container_name: native-api
        user: root
        ports:
            - "8080:8080"
        environment:
            - PORT=8080
            - LOG_LEVEL=info
            - DB_PATH=/data/app.db
            # - API_KEY=change-me            # décommenter pour activer l'authentification
        volumes:
            - api_data:/data # persistance des projets/déploiements
            - /var/run/docker.sock:/var/run/docker.sock # accès au Docker Engine local
        restart: unless-stopped

volumes:
    api_data:
